<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="icon" href="/assets/img/A.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
        <span class="theme-icon">🌙</span>
    </button>
    <img src="/assets/img/ArtFlix.png" alt="ArtFlix" class="logo">
    <h1>Quem está assistindo?</h1>

    <ul class="profiles">
        <li class="profile" data-link="catalogo/catalogo.html">
            <img src="/assets/img/Gengar.png" alt="Lou">
            <p>Lou</p>
        </li>
        <li class="profile" data-link="catalogo/catalogo.html">
            <img src="/assets/img/Dog.png" alt="Cres">
            <p>Cres</p>
        </li> 
        <li class="profile" data-link="catalogo/catalogo.html">
            <img src="/assets/img/Mine.png" alt="Colom">
            <p>Colom</p>
        </li>
        <li class="profile" data-link="catalogo/catalogo.html">
            <img src="/assets/img/Morango.png" alt="Morango">
            <p>Morango</p>
        </li>
        <li class="profile" data-link="catalogo/catalogo.html">
            <img src="/assets/img/Eye.png" alt="Gelos">
            <p>Gelos</p>
        </li>
        <li class="profile" data-link="catalogo/catalogo.html">
            <img src="/assets/img/Juno.png" alt="Lan">
            <p>Lan</p>
        </li>
        
    </ul>

    <script src="js/profile.js"></script>
    <script src="script.js"></script>
    <script>
        // Funcionalidade de clique nos perfis
        document.addEventListener('DOMContentLoaded', () => {
            const profiles = document.querySelectorAll('.profile');
            
            profiles.forEach(profile => {
                profile.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // Pega o nome do perfil
                    const nomePerfil = this.querySelector('p').textContent;
                    
                    // Pega a URL da imagem
                    const imagemPerfil = this.querySelector('img').src;
                    
                    // Armazena no localStorage
                    localStorage.setItem('perfilAtivoNome', nomePerfil);
                    localStorage.setItem('perfilAtivoImagem', imagemPerfil);
                    
                    console.log('Perfil selecionado:', nomePerfil);
                    
                    // Redireciona para o catálogo
                    window.location.href = 'catalogo/catalogo.html';
                });
            });
        });
    </script>
</body>
</html>
